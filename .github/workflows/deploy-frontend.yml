name: Deploy Frontend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch: # Allows manual trigger from UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_FRONTEND_DEPLOY_HOOK secret is not set!"
            exit 1
          fi
          echo "Triggering deploy hook..."
          curl -s -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" | grep -q 'ok' || echo "Deployment triggered (or no output)."
